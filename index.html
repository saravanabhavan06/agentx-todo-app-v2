<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>AgentX Todo</title>
<link rel="stylesheet" href="style.css"/></head>
<body>
<div class="container">
  <h1>AgentX Todo</h1>
  <div class="input-row">
    <input id="ti" type="text" placeholder="Add task..."/>
    <button id="ab">Add</button>
  </div>
  <ul id="tl"></ul>
  <div class="footer">
    <span id="ct">0 remaining</span>
    <button id="cb">Clear done</button>
  </div>
</div>
<script src="app.js"></script>
</body></html>
